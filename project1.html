<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25 minute timer</title>
</head>

<body>
    <h1>25 minute timer</h1>
    <p id="timer"> 25:00</p>

</body>

<script>
    let totalsecond = 60 * 25;
    let timer = setInterval(() => {
        let minute = Math.floor(totalsecond / 60);
        let second = totalsecond % 60;
        second = second < 10 ? "0" + second : second;
        document.getElementById("timer").innerText = minute + ":" + second;

        totalsecond--;
        if (totalsecond < 0) {
            clearInterval(timer);
            document.getElementById("time").innerText = "timeover"
        }
    },1000);
</script>

</html>
